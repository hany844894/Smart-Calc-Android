steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libffi-dev libssl-dev autoconf automake libtool pkg-config cmake openjdk-17-jdk 

      - name: Install Python Tools
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer virtualenv

      - name: Build APK (The Fixed Way)
        run: |
          # هذه الخطوة ستقوم بمسح الإعدادات القديمة التي تسببت في الخطأ
          rm -rf .buildozer
          # تشغيل البناء مع تجاوز رسائل التحذير
          APP_ANDROID_ACCEPT_SDK_LICENSE=1 buildozer -v android debug
